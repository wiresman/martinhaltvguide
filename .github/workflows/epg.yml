name: Update EPG data

# Fetches real listings using the open-source iptv-org/epg grabber and writes
# them into data/guide.json, which the site reads.
#
# Runs on demand from the Actions tab. Once you've confirmed your channels.xml
# produces good data, uncomment the `schedule` block to refresh automatically.

on:
  workflow_dispatch:
  # schedule:
  #   - cron: "0 4 * * *" # daily at 04:00 UTC

permissions:
  contents: write

jobs:
  grab:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Clone iptv-org/epg grabber
        run: git clone --depth 1 https://github.com/iptv-org/epg.git epg-grabber

      - name: Install grabber dependencies
        working-directory: epg-grabber
        run: npm install

      - name: Grab listings
        working-directory: epg-grabber
        # Uses the channel list at the repo root (channels.xml).
        run: npm run grab -- --channels=../channels.xml --output=../guide.xml --days=2

      - name: Convert XMLTV -> guide.json
        run: node scripts/xmltv-to-guide.mjs guide.xml data/guide.json

      - name: Commit updated guide
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet data/guide.json; then
            git add data/guide.json
            git commit -m "chore: refresh EPG data"
            git push
          else
            echo "No changes in guide.json."
          fi
