<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <title>TV Guide · Now &amp; Next</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <h1>TV Guide</h1>
          <span id="source-badge" class="badge">Demo listings</span>
        </div>
        <div class="topbar-right">
          <time id="clock" class="clock"></time>
          <input
            id="search"
            class="search"
            type="search"
            placeholder="Search channels"
            autocomplete="off"
            spellcheck="false"
          />
        </div>
      </div>
    </header>

    <main id="guide" class="guide"></main>

    <footer class="footer">
      <p>Showing what&rsquo;s on now and up next. Times shown in your device&rsquo;s local time.</p>
    </footer>

    <script type="module" src="app.js"></script>
  </body>
</html>
